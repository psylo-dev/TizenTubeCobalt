name: win32 xbox-compatible ci

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build Type (gold oder debug)"
        required: true
        default: "gold"
        type: choice
        options:
          - gold
          - debug
      upload_release:
        description: "As Release Asset"
        required: false
        default: false
        type: boolean

jobs:
  win32_compat:
    runs-on: windows-2022

    env:
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # CACHE LAYER
      # -------------------------
      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ hashFiles('requirements.txt') }}

      # -------------------------
      # PYTHON SETUP (Fixed Alias)
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Disable Python Store Alias
        shell: pwsh
        run: Remove-Item "$env:LOCALAPPDATA\Microsoft\WindowsApps\python*.exe" -ErrorAction SilentlyContinue

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --prefer-binary --no-input

      # -------------------------
      # MSVC ENVIRONMENT (Win32 x64)
      # -------------------------
      - name: Setup MSVC Environment
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          
          # Wir nutzen vcvars64.bat für eine saubere 64-bit Win32 Umgebung
          $vcvars = "$vsPath\VC\Auxiliary\Build\vcvars64.bat"
          $envOut = cmd /c "`"$vcvars`" && set"
          
          foreach ($line in $envOut) {
            if ($line -match "^([^=]+)=(.*)$") {
              $name = $matches[1]; $val = $matches[2]
              if ($name -eq "Path") {
                $val -split ";" | ForEach-Object { if ($_ -and (Test-Path $_)) { Add-Content $env:GITHUB_PATH $_ } }
              } else {
                Add-Content $env:GITHUB_ENV "$name=$val"
              }
            }
          }

      # -------------------------
      # TOOLS (GN + NASM)
      # -------------------------
      - name: Install Build Tools
        shell: pwsh
        run: |
          # GN Install
          if (!(Test-Path "C:\tools\gn")) {
            New-Item -ItemType Directory -Force C:\tools\gn | Out-Null
            Invoke-WebRequest "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest" -OutFile gn.zip
            Expand-Archive gn.zip C:\tools\gn -Force
          }
          Add-Content $env:GITHUB_PATH "C:\tools\gn"

          # NASM Install (Wichtig für ICU/Zlib)
          if (!(Get-Command nasm -ErrorAction SilentlyContinue)) {
            choco install nasm -y --no-progress
            $nasmPath = "C:\Program Files\NASM"
            if (Test-Path $nasmPath) { Add-Content $env:GITHUB_PATH $nasmPath }
          }

      # -------------------------
      # MSVC JUNCTION (Verhindert File Not Found)
      # -------------------------
      - name: MSVC Toolchain Junction
        shell: pwsh
        run: |
          $msvcBase = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC"
          if (Test-Path $msvcBase) {
            $actual = Get-ChildItem $msvcBase | Select-Object -First 1
            $required = Join-Path $msvcBase "14.34.31933"
            if (!(Test-Path $required)) {
                New-Item -ItemType Junction -Path $required -Value $actual.FullName
            }
          }

      # -------------------------
      # BUILD STEPS (Win32 Konfiguration)
      # -------------------------
      - name: Download Resources
        shell: pwsh
        run: python download_resources.py

      - name: GN Gen (Win32 x64)
        shell: pwsh
        run: |
          # Wir nutzen hier die win32 plattform anstatt xb1, 
          # falls dein Projekt win-spezifische GN-Files hat.
          python cobalt/build/gn.py -p win32 -c ${{ inputs.build_type }} -o out/win32

      - name: Build (NINJA)
        shell: pwsh
        run: |
          $env:NINJA_STATUS='[%e sec | %f/%t | %r]'
          # Fix: Suppress optimization override warnings (D9025)
          $env:_CL_ = "/wd9025"
          # Fix: Sicherstellen, dass NASM im Pfad ist
          $env:PATH = "C:\Program Files\NASM;$env:PATH"
          
          ninja -C out/win32 cobalt_install -j $env:NUMBER_OF_PROCESSORS

      # -------------------------
      # ARTIFACTS
      # -------------------------
      - name: Upload Win32 Build
        uses: actions/upload-artifact@v4
        with:
          name: cobalt-win32-${{ inputs.build_type }}
          path: out/win32/cobalt*

      - name: Release Upload
        if: inputs.upload_release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: out/win32/*.exe
          file_glob: true
          asset_name: cobalt-win32-${{ inputs.build_type }}.exe
          tag: win32-build
          overwrite: true
