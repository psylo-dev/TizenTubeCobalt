name: win32 + xb1 parallel ci

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build Type (gold oder debug)"
        required: true
        default: "gold"
        type: choice
        options:
          - gold
          - debug

      upload_release:
        description: "As Release Asset"
        required: false
        default: false
        type: boolean


jobs:

# =========================
# WIN32
# =========================
  win32:
    runs-on: windows-2022

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # PYTHON
      # -------------------------
      - name: Setup Python env
        shell: pwsh
        run: py -3 -m venv .venv

      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      # -------------------------
      # GN (FIXED)
      # -------------------------
      - name: Install GN
        shell: pwsh
        run: |
          if (!(Test-Path "C:\tools\gn")) {
            New-Item -ItemType Directory -Force C:\tools\gn | Out-Null

            Invoke-WebRequest `
              "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest" `
              -OutFile gn.zip

            Expand-Archive gn.zip C:\tools\gn -Force
          }

          Add-Content $env:GITHUB_PATH "C:\tools\gn"

          & "C:\tools\gn\gn.exe" --version

      # -------------------------
      # FLEX / BISON
      # -------------------------
      - name: Install win_bison
        shell: pwsh
        run: |
          choco install winflexbison -y --no-progress

          Add-Content $env:GITHUB_PATH "C:\ProgramData\chocolatey\bin"

      # -------------------------
      # MSVC (ROBUST FIX)
      # -------------------------
      - name: Setup MSVC (FIXED)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # -------------------------
      # CLEAN
      # -------------------------
      - name: Clean build
        shell: pwsh
        run: Remove-Item out/win32 -Recurse -Force -ErrorAction SilentlyContinue

      # -------------------------
      # BUILD
      # -------------------------
      - name: GN generate win32
        run: .\.venv\Scripts\python.exe cobalt/build/gn.py -p win-win32 -c ${{ inputs.build_type }} -o out/win32

      - name: Build win32
        run: ninja -C out/win32 cobalt_install

      - name: Upload win32
        uses: actions/upload-artifact@v4
        with:
          name: win32-build
          path: out/win32/**


# =========================
# XB1
# =========================
  xb1:
    runs-on: windows-2022

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # PYTHON
      # -------------------------
      - name: Setup Python env
        shell: pwsh
        run: py -3 -m venv .venv

      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      # -------------------------
      # GN
      # -------------------------
      - name: Install GN
        shell: pwsh
        run: |
          if (!(Test-Path "C:\tools\gn")) {
            New-Item -ItemType Directory -Force C:\tools\gn | Out-Null

            Invoke-WebRequest `
              "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest" `
              -OutFile gn.zip

            Expand-Archive gn.zip C:\tools\gn -Force
          }

          Add-Content $env:GITHUB_PATH "C:\tools\gn"
          & "C:\tools\gn\gn.exe" --version

      # -------------------------
      # FLEX / BISON
      # -------------------------
      - name: Install win_bison
        shell: pwsh
        run: choco install winflexbison -y --no-progress

      # -------------------------
      # MSVC FIX (ROBUST)
      # -------------------------
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # -------------------------
      # CLEAN
      # -------------------------
      - name: Clean build
        shell: pwsh
        run: Remove-Item out/xb1 -Recurse -Force -ErrorAction SilentlyContinue

      # -------------------------
      # BUILD XB1
      # -------------------------
      - name: GN generate xb1
        run: .\.venv\Scripts\python.exe cobalt/build/gn.py -p xb1 -c ${{ inputs.build_type }} -o out/xb1

      - name: Build xb1
        run: ninja -C out/xb1 cobalt_install

      - name: Upload xb1
        uses: actions/upload-artifact@v4
        with:
          name: xb1-build
          path: out/xb1/**


# =========================
# RELEASE MERGE
# =========================
  release:
    needs: [win32, xb1]
    if: inputs.upload_release
    runs-on: windows-2022

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: win32-build
          path: dist/win32

      - uses: actions/download-artifact@v4
        with:
          name: xb1-build
          path: dist/xb1

      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/**/*
          file_glob: true
          tag: multi-build
          overwrite: true
