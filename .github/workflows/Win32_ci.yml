name: win32 + xb1 parallel ci

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build Type (gold oder debug)"
        required: true
        default: "gold"
        type: choice
        options:
          - gold
          - debug

      upload_release:
        description: "As Release Asset"
        required: false
        default: false
        type: boolean

jobs:

  # =========================
  # WIN32 BUILD
  # =========================
  win32:
    runs-on: windows-2022

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # FIX BISON
      - name: Install win_bison
        shell: pwsh
        run: |
          choco install winflexbison -y --no-progress
          echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

      - name: Setup MSVC
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          cmd /c "`"$vsPath\VC\Auxiliary\Build\vcvars64.bat`" && set" | ForEach-Object {
            if ($_ -match "^([^=]+)=(.*)$") { Add-Content $env:GITHUB_ENV "$($matches[1])=$($matches[2])" }
          }

      - name: GN gen win32
        run: python cobalt/build/gn.py -p win32 -c ${{ inputs.build_type }} -o out/win32

      - name: Build win32
        run: ninja -C out/win32 cobalt_install

      - name: Upload win32
        uses: actions/upload-artifact@v4
        with:
          name: win32-build
          path: out/win32/cobalt*


  # =========================
  # XB1 BUILD (PARALLEL)
  # =========================
  xb1:
    runs-on: windows-2022

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # FIX BISON
      - name: Install win_bison
        shell: pwsh
        run: |
          choco install winflexbison -y --no-progress
          echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

      - name: Setup MSVC
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          cmd /c "`"$vsPath\VC\Auxiliary\Build\vcvars64.bat`" && set" | ForEach-Object {
            if ($_ -match "^([^=]+)=(.*)$") { Add-Content $env:GITHUB_ENV "$($matches[1])=$($matches[2])" }
          }

      - name: GN gen xb1
        run: python cobalt/build/gn.py -p xb1 -c ${{ inputs.build_type }} -o out/xb1

      - name: Build xb1
        run: ninja -C out/xb1 cobalt_install

      - name: Upload xb1
        uses: actions/upload-artifact@v4
        with:
          name: xb1-build
          path: out/xb1/cobalt*


  # =========================
  # OPTIONAL RELEASE MERGE
  # =========================
  release:
    needs: [win32, xb1]
    if: inputs.upload_release
    runs-on: windows-2022

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: win32-build
          path: dist/win32

      - uses: actions/download-artifact@v4
        with:
          name: xb1-build
          path: dist/xb1

      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/**/*.exe
          file_glob: true
          tag: multi-build
          overwrite: true
