name: uwp_xb1_release

# Manuell auslösbar + optional bei Tags
on:
  workflow_dispatch:      # ← Ermöglicht manuellen Start
    inputs:
      build_type:
        description: 'Build Type (gold oder debug)'
        required: true
        default: 'gold'
        type: choice
        options:
          - gold
          - debug
      upload_release:
        description: 'Upload als Release Asset'
        required: false
        default: false
        type: boolean

  # push:
  #   tags:
  #     - 'v*'

jobs:
  xb1:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install GN
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest" -OutFile "gn.zip"
          Expand-Archive -Path "gn.zip" -DestinationPath "gn_bin" -Force
          Move-Item -Path "gn_bin/gn.exe" -Destination "C:\Program Files\gn.exe" -Force
          echo "C:\Program Files" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Set PYTHONPATH
        shell: pwsh
        run: |
          echo "PYTHONPATH=$env:GITHUB_WORKSPACE;$env:PYTHONPATH" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: GN Gen
        shell: pwsh
        run: |
          \( buildType = " \){{ inputs.build_type }}"
          gn gen out/xb1_\( {buildType} --args="target_platform=`"xb1`" target_os=`"winuwp`" target_cpu=`"x64`" build_type=`" \){buildType}`""
          gn check out/xb1_${buildType}

      - name: Install build dependencies
        shell: pwsh
        run: |
          choco install -y nasm
          # Weitere Tools bei Bedarf hinzufügen

      - name: Build Cobalt
        shell: pwsh
        run: |
          \( buildType = " \){{ inputs.build_type }}"
          $env:NINJA_STATUS = "[%e sec | %f/%t %u remaining | %c/sec | j%r] "
          ninja -C out/xb1_${buildType} cobalt_install

      - name: Package Appx
        shell: pwsh
        run: |
          \( buildType = " \){{ inputs.build_type }}"
          python starboard/xb1/tools/packager.py `
            -s out/xb1_${buildType}/ `
            -o out/xb1_${buildType}/package `
            -p cobalt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cobalt-xb1-${{ inputs.build_type }}
          path: |
            out/xb1_${{ inputs.build_type }}/cobalt*
            out/xb1_${{ inputs.build_type }}/package/**/*

      - name: Upload to GitHub Release
        if: inputs.upload_release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: out/xb1_${{ inputs.build_type }}/package/*.appx
          asset_name: cobalt-xb1-${{ inputs.build_type }}.appx
          tag: ${{ github.ref_name || 'manual-build' }}
          overwrite: true
