name: uwp_xb1_releaseee

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload GitHub Release"
        required: false
        default: false
        type: boolean

jobs:
  xb1:
    runs-on: windows-latest
    timeout-minutes: 120

    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      BUILD_TYPE: gold

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Visual Studio workloads + SDKs
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"

          $vsPath = & $vsWhere -latest -products * -property installationPath

          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            Write-Error "Visual Studio nicht gefunden"
            exit 1
          }

          Write-Host "VS gefunden:"
          Write-Host $vsPath

          $components = @(
            "Microsoft.VisualStudio.Workload.NativeDesktop"
            "Microsoft.VisualStudio.Workload.Universal"

            "Microsoft.VisualStudio.ComponentGroup.UWP.VC"
            "Microsoft.VisualStudio.Component.VC.ATL"

            "Microsoft.VisualStudio.Component.VC.14.34.17.4.x86.x64"

            "Microsoft.VisualStudio.Component.Windows10SDK.18362"
            "Microsoft.VisualStudio.Component.Windows11SDK.22000"
          )

          $args = @(
            "modify"
            "--installPath"
            "`"$vsPath`""
            "--quiet"
            "--norestart"
          )

          foreach ($c in $components) {
            $args += "--add"
            $args += $c
          }

          Write-Host ($args -join " ")

          $proc = Start-Process `
            -FilePath $vsInstaller `
            -ArgumentList $args `
            -Wait `
            -PassThru

          Write-Host "Installer ExitCode: $($proc.ExitCode)"

          if ($proc.ExitCode -ne 0) {
            Write-Error "VS Installation fehlgeschlagen"
            exit 1
          }

      - name: Verify WinMD contract
        shell: pwsh
        run: |
          $winmd = "C:\Program Files (x86)\Windows Kits\10\References\10.0.22000.0\Windows.Foundation.FoundationContract\4.0.0.0\Windows.Foundation.FoundationContract.winmd"

          if (!(Test-Path $winmd)) {
            Write-Error "WINMD fehlt"
            Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\References" -Recurse -ErrorAction SilentlyContinue
            exit 1
          }

          Write-Host "WINMD OK"

      - name: Setup MSVC environment
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -products * -property installationPath

          $msvcVersion = "14.34.31933"
          $sdkVersion = "10.0.18362.0"

          $msvcPath = "$vsPath\VC\Tools\MSVC\$msvcVersion"
          if (!(Test-Path $msvcPath)) {
            Write-Error "MSVC fehlt"
            exit 1
          }

          $sdkPath = "C:\Program Files (x86)\Windows Kits\10\include\$sdkVersion"
          if (!(Test-Path $sdkPath)) {
            Write-Error "SDK fehlt"
            exit 1
          }

          Add-Content $env:GITHUB_ENV "VCToolsVersion=$msvcVersion"
          Add-Content $env:GITHUB_ENV "WindowsSDKVersion=$sdkVersion"

          Write-Host "Toolchain OK"

      - name: Verify toolchain
        shell: pwsh
        run: |
          Write-Host "MSVC: $env:VCToolsVersion"
          Write-Host "SDK: $env:WindowsSDKVersion"

      - name: Create output directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "out/$env:BUILD_TYPE"

      - name: Generate GN files
        shell: pwsh
        run: |
          python cobalt/build/gn.py -c $env:BUILD_TYPE

      - name: Build Cobalt
        shell: pwsh
        run: |
          ninja -C out/$env:BUILD_TYPE

      - name: Collect artifacts
        if: success()
        shell: pwsh
        run: |
          $dir = "artifact_upload"
          Remove-Item $dir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $dir

          Copy-Item "out/$env:BUILD_TYPE/*" $dir -Recurse -Force

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cobalt_xb1_gold
          path: artifact_upload/**
          retention-days: 30

      - name: Create release zip
        if: success() && inputs.upload_release == true
        shell: pwsh
        run: |
          Compress-Archive -Path "artifact_upload/*" -DestinationPath "cobalt_xb1_gold.zip"

      - name: Upload release
        if: success() && inputs.upload_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_number }}
          generate_release_notes: true
          files: cobalt_xb1_gold.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
