name: xbox

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (gold oder debug)'
        required: true
        default: 'gold'
        type: choice
        options:
          - gold
          - debug
      upload_release:
        description: 'Upload als Release Asset'
        required: false
        default: false
        type: boolean

jobs:
  xb1:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python requirements
        shell: pwsh
        run: pip install -r requirements.txt

      - name: Install all required VS2022 Components
        shell: pwsh
        run: |
          $ProgramFiles86 = ${env:ProgramFiles(x86)}
          $vsWhere = "$ProgramFiles86\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstaller = "$ProgramFiles86\Microsoft Visual Studio\Installer\vs_installer.exe"
          
          if (-not (Test-Path $vsWhere)) {
            Write-Error "vswhere.exe nicht gefunden!"
            exit 1
          }
          
          $vsPath = & $vsWhere -latest -products * -property installationPath
          Write-Host "VS Installation Path: $vsPath"

          $components = @(
            "Microsoft.VisualStudio.Component.VC.14.34.17.4.x86.x64",
            "Microsoft.VisualStudio.Component.VC.Tools.x86.x64",
            "Microsoft.VisualStudio.Component.VC.Llvm.Clang",
            "Microsoft.VisualStudio.Component.VC.Llvm.ClangToolset",
            "Microsoft.VisualStudio.Component.Windows10SDK.18362",
            "Microsoft.VisualStudio.Component.Windows11SDK.26100",
            "Microsoft.VisualStudio.Component.Windows11SDK.22621",
            "Microsoft.VisualStudio.Component.Windows10SDK.20348",
            "Microsoft.VisualStudio.ComponentGroup.UWP.VC",
            "Microsoft.VisualStudio.Component.VC.ATL",
            "Microsoft.VisualStudio.Workload.NativeDesktop"
          )

          $addArgs = ($components | ForEach-Object { "--add $_" }) -join " "
          Write-Host "Installiere Komponenten..."
          
          $proc = Start-Process -FilePath $vsInstaller `
            -ArgumentList "modify --installPath `"$vsPath`" $addArgs --quiet --norestart --wait" `
            -Wait -PassThru

          Write-Host "VS Installer Exit Code: $($proc.ExitCode) (87 ist oft akzeptabel)"

      - name: Setup MSVC + SDK Environment
        shell: pwsh
        run: |
          $ProgramFiles86 = ${env:ProgramFiles(x86)}
          $vsWhere = "$ProgramFiles86\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          Write-Host "VS Path: $vsPath"

          # MSVC Version
          $msvcPath = "$vsPath\VC\Tools\MSVC\14.34.31933"
          if (Test-Path $msvcPath) {
            Write-Host "MSVC 14.34.31933 wird verwendet"
            Add-Content -Path $env:GITHUB_ENV -Value "VCToolsVersion=14.34.31933"
          } else {
            $latest = (Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1).Name
            Write-Host "Verwende neueste MSVC: $latest"
            Add-Content -Path $env:GITHUB_ENV -Value "VCToolsVersion=$latest"
          }

          # SDK Version
          $preferredSdk = "10.0.26100.0"
          if (Test-Path "C:\Program Files (x86)\Windows Kits\10\include\$preferredSdk") {
            Write-Host "SDK $preferredSdk wird verwendet"
            Add-Content -Path $env:GITHUB_ENV -Value "WindowsSDKVersion=$preferredSdk"
          } else {
            $latestSdk = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\include" -Directory |
              Where-Object { $_.Name -match '^\d' } | Sort-Object Name -Descending | Select-Object -First 1).Name
            Write-Host "Verwende SDK: $latestSdk"
            Add-Content -Path $env:GITHUB_ENV -Value "WindowsSDKVersion=$latestSdk"
          }

          # vcvars64.bat ausführen und Environment übernehmen
          $vcvars = "$vsPath\VC\Auxiliary\Build\vcvars64.bat"
          Write-Host "Lade vcvars64.bat ..."
          $envOutput = cmd /c "`"$vcvars`" && set"
          
          foreach ($line in $envOutput) {
            if (\( line -match '^([^=]+)=(.*) \)') {
              $name = $matches[1]
              $value = $matches[2]
              [System.Environment]::SetEnvironmentVariable($name, $value, "Process")
              Add-Content -Path $env:GITHUB_ENV -Value "$name=$value"
            }
          }
          Write-Host "MSVC + SDK Umgebung erfolgreich gesetzt."

      - name: Cache GN binary
        id: cache-gn
        uses: actions/cache@v4
        with:
          path: C:\tools\gn
          key: gn-windows-amd64-latest

      - name: Install GN
        if: steps.cache-gn.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "C:\tools\gn" | Out-Null
          Invoke-WebRequest -Uri "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest" -OutFile "gn.zip"
          Expand-Archive -Path "gn.zip" -DestinationPath "C:\tools\gn" -Force

      - name: Add GN to PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\tools\gn"

      - name: Install NASM
        shell: pwsh
        run: choco install -y nasm

      - name: Add NASM to PATH
        shell: pwsh
        run: |
          $nasmExe = Get-ChildItem "C:\ProgramData\chocolatey\lib\nasm" -Recurse -Filter "nasm.exe" | Select-Object -First 1
          Add-Content -Path $env:GITHUB_PATH -Value $nasmExe.DirectoryName

      - name: Set Build Variables
        shell: pwsh
        run: |
          Add-Content -Path \( env:GITHUB_ENV -Value "BUILD_TYPE= \){{ inputs.build_type }}"
          Add-Content -Path \( env:GITHUB_ENV -Value "OUTPUT_DIR=out/xb1_ \){{ inputs.build_type }}"

      - name: Download resources
        shell: pwsh
        run: |
          \( env:PYTHONPATH = " \){{ github.workspace }};$env:PYTHONPATH}"
          python download_resources.py

      - name: GN Gen
        shell: pwsh
        run: |
          \( env:PYTHONPATH = " \){{ github.workspace }};$env:PYTHONPATH}"
          python cobalt/build/gn.py -p xb1 -c ${{ inputs.build_type }} -o ${{ env.OUTPUT_DIR }}
          gn check ${{ env.OUTPUT_DIR }}

      - name: Build Cobalt
        shell: pwsh
        run: |
          \( env:PYTHONPATH = " \){{ github.workspace }};$env:PYTHONPATH}"
          $env:NINJA_STATUS = '[%e sec | %f/%t %u remaining | %c/sec | j%r] '
          ninja -C ${{ env.OUTPUT_DIR }} cobalt_install

      - name: Package Appx
        shell: pwsh
        run: |
          \( env:PYTHONPATH = " \){{ github.workspace }};$env:PYTHONPATH}"
          python starboard/xb1/tools/packager.py -s ${{ env.OUTPUT_DIR }}/ -o ${{ env.OUTPUT_DIR }}/package -p cobalt

      - name: Verify Appx
        shell: pwsh
        run: |
          \( appx = Get-ChildItem -Path " \){{ env.OUTPUT_DIR }}/package" -Filter "*.appx" -ErrorAction SilentlyContinue
          if (-not $appx) { 
            Write-Error "Keine .appx Datei gefunden!"
            exit 1 
          }
          Write-Host "Erfolgreich erstellt: $($appx.FullName)"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cobalt-xb1-${{ inputs.build_type }}
          path: |
            ${{ env.OUTPUT_DIR }}/cobalt*
            ${{ env.OUTPUT_DIR }}/package/**/*

      - name: Upload to GitHub Release
        if: inputs.upload_release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.OUTPUT_DIR }}/package/*.appx
          file_glob: true
          asset_name: cobalt-xb1-${{ inputs.build_type }}.appx
          tag: ${{ github.ref_type == 'tag' && github.ref_name || 'manual-build' }}
          overwrite: true
