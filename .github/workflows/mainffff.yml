name: Build Cobalt XB1 (Windows)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      IMAGE: ghcr.io/youtube/cobalt/cobalt-build-xb1:experimental-unused

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker version
        run: docker version

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull XB1 Windows Image
        run: docker pull $env:IMAGE

      - name: Run build container
        run: |
          docker run --rm `
            -v ${PWD}:/src `
            -w /src `
            $env:IMAGE `
            powershell -Command "
              Write-Host 'XB1 Build Start'

              if (Test-Path ./scripts/build.ps1) {
                ./scripts/build.ps1 xb1
              } elseif (Test-Path ./build.ps1) {
                ./build.ps1 xb1
              } else {
                npm install
                npm run build
              }
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cobalt-xb1
          path: |
            dist/**
            build/**
            out/**
