name: uwp_xb1_release

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (gold oder debug)'
        required: true
        default: 'gold'
        type: choice
        options:
          - gold
          - debug
      upload_release:
        description: 'Upload als Release Asset'
        required: false
        default: false
        type: boolean

jobs:
  xb1:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python requirements
        shell: pwsh
        run: |
          # TizenTubeCobalt hat eine requirements.txt mit Build-Dependencies
          pip install -r requirements.txt

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache GN binary
        id: cache-gn
        uses: actions/cache@v4
        with:
          path: C:\tools\gn
          key: gn-windows-amd64-latest

      - name: Install GN
        if: steps.cache-gn.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "C:\tools\gn" | Out-Null
          Invoke-WebRequest -Uri "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest" -OutFile "gn.zip"
          Expand-Archive -Path "gn.zip" -DestinationPath "C:\tools\gn" -Force

      - name: Add GN to PATH
        shell: pwsh
        run: |
          echo "C:\tools\gn" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Cache NASM
        id: cache-nasm
        uses: actions/cache@v4
        with:
          path: C:\ProgramData\chocolatey\lib\nasm
          key: nasm-choco-windows

      - name: Install build dependencies
        if: steps.cache-nasm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          choco install -y nasm

      - name: Add NASM to PATH
        shell: pwsh
        run: |
          $nasmPath = Get-ChildItem "C:\ProgramData\chocolatey\lib\nasm" -Recurse -Filter "nasm.exe" | Select-Object -First 1 -ExpandProperty DirectoryName
          echo "$nasmPath" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Set Environment Variables
        shell: pwsh
        run: |
          echo "BUILD_TYPE=${{ inputs.build_type }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OUTPUT_DIR=out/xb1_${{ inputs.build_type }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download resources
        shell: pwsh
        run: |
          # TizenTubeCobalt-spezifisch: laedt externe Ressourcen/Assets vor dem Build
          $env:PYTHONPATH = "${{ github.workspace }};$env:PYTHONPATH"
          python download_resources.py

      - name: Cache Ninja build output
        uses: actions/cache@v4
        with:
          path: ${{ env.OUTPUT_DIR }}
          key: ninja-xb1-${{ inputs.build_type }}-${{ hashFiles('**/*.gn', '**/*.gni', 'DEPS') }}
          restore-keys: |
            ninja-xb1-${{ inputs.build_type }}-

      - name: GN Gen
        shell: pwsh
        run: |
          # PYTHONPATH muss das Repo-Root zuerst enthalten (BUILDCONFIG.gn assert)
          # build/timestamp.gni braucht compute_build_timestamp.py via exec_script
          $env:PYTHONPATH = "${{ github.workspace }};$env:PYTHONPATH"

          # Offizieller Cobalt-Wrapper: setzt build_timestamp und alle
          # internen GN-Variablen korrekt auf, ruft dann gn gen auf
          python cobalt/build/gn.py `
            -p xb1 `
            -c ${{ inputs.build_type }} `
            -o ${{ env.OUTPUT_DIR }}

          gn check ${{ env.OUTPUT_DIR }}

      - name: Build Cobalt
        shell: pwsh
        run: |
          $env:PYTHONPATH = "${{ github.workspace }};$env:PYTHONPATH"
          $env:NINJA_STATUS = "[%e sec | %f/%t %u remaining | %c/sec | j%r] "
          ninja -C ${{ env.OUTPUT_DIR }} cobalt_install

      - name: Package Appx
        shell: pwsh
        run: |
          $env:PYTHONPATH = "${{ github.workspace }};$env:PYTHONPATH"
          python starboard/xb1/tools/packager.py `
            -s ${{ env.OUTPUT_DIR }}/ `
            -o ${{ env.OUTPUT_DIR }}/package `
            -p cobalt

      - name: Verify Appx exists
        shell: pwsh
        run: |
          $appx = Get-ChildItem -Path "${{ env.OUTPUT_DIR }}/package" -Filter "*.appx" -ErrorAction SilentlyContinue
          if (-not $appx) {
            Write-Error "Kein .appx gefunden in ${{ env.OUTPUT_DIR }}/package"
            exit 1
          }
          Write-Host "Gefunden: $($appx.FullName)"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cobalt-xb1-${{ inputs.build_type }}
          path: |
            ${{ env.OUTPUT_DIR }}/cobalt*
            ${{ env.OUTPUT_DIR }}/package/**/*

      - name: Upload to GitHub Release
        if: inputs.upload_release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.OUTPUT_DIR }}/package/*.appx
          file_glob: true
          asset_name: cobalt-xb1-${{ inputs.build_type }}.appx
          tag: ${{ github.ref_type == 'tag' && github.ref_name || 'manual-build' }}
          overwrite: true
      - name: Upload to GitHub Release
        if: inputs.upload_release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.OUTPUT_DIR }}/package/*.appx
          file_glob: true
          asset_name: cobalt-xb1-${{ inputs.build_type }}.appx
          tag: ${{ github.ref_type == 'tag' && github.ref_name || 'manual-build' }}
          overwrite: true
