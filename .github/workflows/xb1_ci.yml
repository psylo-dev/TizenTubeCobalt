name: xbox ci

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build Type (gold oder debug)"
        required: true
        default: "gold"
        type: choice
        options:
          - gold
          - debug
      upload_release:
        description: "Upload als Release Asset"
        required: false
        default: false
        type: boolean

jobs:
  xb1:
    # Pinning to 2022 to keep MSVC 14.3x paths stable and avoid VS2026 redirects
    runs-on: windows-2022

    env:
      PYTHONPATH: ${{ github.workspace }}
      # Opt-in to Node 24 to clear deprecation warnings for 2026
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # CACHE LAYER
      # -------------------------
      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache GN
        uses: actions/cache@v4
        with:
          path: C:\tools\gn
          key: gn-windows

      # -------------------------
      # PYTHON SETUP
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Disable Python Store Alias
        shell: pwsh
        run: |
          # Removes the 'fake' python.exe that triggers the Microsoft Store popup
          Remove-Item "$env:LOCALAPPDATA\Microsoft\WindowsApps\python*.exe" -ErrorAction SilentlyContinue

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --prefer-binary --no-input

      # -------------------------
      # MSVC ENVIRONMENT SETUP
      # -------------------------
      - name: Setup MSVC Environment
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

          $vcvars = "$vsPath\VC\Auxiliary\Build\vcvars64.bat"
          $envOut = cmd /c "`"$vcvars`" && set"

          foreach ($line in $envOut) {
            if ($line -match "^([^=]+)=(.*)$") {
              $name = $matches[1]
              $val = $matches[2]
              if ($name -eq "Path") {
                $val -split ";" | ForEach-Object {
                  if ($_ -and (Test-Path $_)) { Add-Content $env:GITHUB_PATH $_ }
                }
              } else {
                Add-Content $env:GITHUB_ENV "$name=$val"
              }
            }
          }

      # -------------------------
      # TOOLS (GN + NASM)
      # -------------------------
      - name: Install Build Tools
        shell: pwsh
        run: |
          if (!(Test-Path "C:\tools\gn")) {
            New-Item -ItemType Directory -Force C:\tools\gn | Out-Null
            Invoke-WebRequest "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest" -OutFile gn.zip
            Expand-Archive gn.zip C:\tools\gn -Force
          }
          if (!(Get-Command nasm -ErrorAction SilentlyContinue)) {
            choco install nasm -y --no-progress
          }
          Add-Content $env:GITHUB_PATH "C:\tools\gn"

      # -------------------------
      # BUILD CONFIG & HARDCODED PATH FIX
      # -------------------------
      - name: Set Build Variables & Path Fix
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV "BUILD_TYPE=${{ inputs.build_type }}"
          Add-Content $env:GITHUB_ENV "OUTPUT_DIR=out/xb1_${{ inputs.build_type }}"
          
          # Fix for Ninja 'CreateProcess' error: 
          # Links whatever MSVC version is on the runner to the path expected by Cobalt
          $msvcBase = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC"
          if (Test-Path $msvcBase) {
            $actual = Get-ChildItem $msvcBase | Select-Object -First 1
            $required = Join-Path $msvcBase "14.34.31933"
            if (!(Test-Path $required)) {
                Write-Host "Creating Junction: $actual -> $required"
                New-Item -ItemType Junction -Path $required -Value $actual.FullName
            }
          }

      # -------------------------
      # EXECUTION STEPS
      # -------------------------
      - name: Download Resources
        shell: pwsh
        run: python download_resources.py

      - name: GN Gen
        shell: pwsh
        run: python cobalt/build/gn.py -p xb1 -c ${{ inputs.build_type }} -o ${{ env.OUTPUT_DIR }}

      - name: Build (NINJA)
        shell: pwsh
        run: |
          $env:NINJA_STATUS='[%e sec | %f/%t | %r]'
          ninja -C ${{ env.OUTPUT_DIR }} cobalt_install -j $env:NUMBER_OF_PROCESSORS

      - name: Package Appx
        shell: pwsh
        run: python starboard/xb1/tools/packager.py -s ${{ env.OUTPUT_DIR }}/ -o ${{ env.OUTPUT_DIR }}/package -p cobalt

      # -------------------------
      # ARTIFACTS
      # -------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobalt-xb1-${{ inputs.build_type }}
          path: |
            ${{ env.OUTPUT_DIR }}/cobalt*
            ${{ env.OUTPUT_DIR }}/package/**

      - name: Release Upload
        if: inputs.upload_release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.OUTPUT_DIR }}/package/*.appx
          file_glob: true
          asset_name: cobalt-xb1-${{ inputs.build_type }}.appx
          tag: manual-build
          overwrite: true
