name: uwp_xb1_release

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload GitHub Release"
        required: false
        default: false
        type: boolean

jobs:
  xb1:
    runs-on: windows-2022
    timeout-minutes: 120

    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      BUILD_TYPE: gold

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # -------------------------
      # INSTALL SDK (STABLE WAY)
      # -------------------------
      - name: Install Windows SDK (latest available)
        shell: pwsh
        run: |
          choco install windows-sdk-10.0 -y

          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\include"
          Write-Host "Installed SDK versions:"
          Get-ChildItem $sdkRoot

      # -------------------------
      # USE LATEST SDK AUTOMATICALLY
      # -------------------------
      - name: Detect Windows SDK
        shell: pwsh
        run: |
          $sdkBase = "C:\Program Files (x86)\Windows Kits\10\include"
          $version = Get-ChildItem $sdkBase | Sort-Object Name -Descending | Select-Object -First 1

          if (-not $version) {
            Write-Error "Kein Windows SDK gefunden"
            exit 1
          }

          $sdkVersion = $version.Name
          Write-Host "Using SDK: $sdkVersion"

          Add-Content $env:GITHUB_ENV "WindowsSDKVersion=$sdkVersion"

      # -------------------------
      # MSVC FIXED
      # -------------------------
      - name: Setup MSVC environment
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -products * -property installationPath

          $msvcPath = Get-ChildItem "$vsPath\VC\Tools\MSVC" | Sort-Object Name -Descending | Select-Object -First 1

          if (!(Test-Path $msvcPath.FullName)) {
            Write-Error "MSVC fehlt"
            exit 1
          }

          Add-Content $env:GITHUB_ENV "VCToolsVersion=$($msvcPath.Name)"

      # -------------------------
      # BUILD
      # -------------------------
      - name: Generate GN
        shell: pwsh
        run: |
          python cobalt/build/gn.py -c $env:BUILD_TYPE

      - name: Build
        shell: pwsh
        run: |
          ninja -C out/$env:BUILD_TYPE

      # -------------------------
      # ARTIFACT
      # -------------------------
      - name: Collect artifact
        if: success()
        shell: pwsh
        run: |
          $dir = "artifact"
          Remove-Item $dir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $dir

          Copy-Item "out/$env:BUILD_TYPE/*" $dir -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xb1_build
          path: artifact/**
          retention-days: 30

      - name: Release ZIP
        if: success() && inputs.upload_release == true
        shell: pwsh
        run: |
          Compress-Archive -Path "artifact/*" -DestinationPath "xb1.zip"

      - name: Upload Release
        if: success() && inputs.upload_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_number }}
          files: xb1.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
