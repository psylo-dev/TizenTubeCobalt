name: uwp_xb1_release

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload GitHub Release"
        required: false
        default: false
        type: boolean

jobs:
  xb1:
    runs-on: windows-latest
    timeout-minutes: 120

    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      BUILD_TYPE: gold

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # -------------------------
      # FORCE INSTALL SDK 18362
      # -------------------------
      - name: Install Windows SDK 10.0.18362 + MSVC
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"

          $vsPath = & $vsWhere -latest -products * -property installationPath

          Write-Host "VS PATH:"
          Write-Host $vsPath

          $components = @(
            "Microsoft.VisualStudio.Workload.NativeDesktop",
            "Microsoft.VisualStudio.Workload.Universal",

            "Microsoft.VisualStudio.ComponentGroup.UWP.VC",
            "Microsoft.VisualStudio.Component.VC.ATL",

            "Microsoft.VisualStudio.Component.VC.14.34.17.4.x86.x64",

            # FORCE EXACT SDK
            "Microsoft.VisualStudio.Component.Windows10SDK.18362"
          )

          $args = @(
            "modify",
            "--installPath",
            "`"$vsPath`"",
            "--quiet",
            "--norestart"
          )

          foreach ($c in $components) {
            $args += "--add"
            $args += $c
          }

          Write-Host "Installing SDK 18362..."
          Write-Host ($args -join " ")

          $proc = Start-Process `
            -FilePath $vsInstaller `
            -ArgumentList $args `
            -Wait `
            -PassThru

          Write-Host "ExitCode: $($proc.ExitCode)"

          if ($proc.ExitCode -ne 0) {
            Write-Error "SDK Installation failed"
            exit 1
          }

      # -------------------------
      # VERIFY EXACT SDK PATH
      # -------------------------
      - name: Verify SDK 18362
        shell: pwsh
        run: |
          $sdk = "C:\Program Files (x86)\Windows Kits\10\include\10.0.18362.0"

          if (!(Test-Path $sdk)) {
            Write-Error "SDK 18362 NICHT installiert!"
            Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\include"
            exit 1
          }

          Write-Host "SDK 18362 OK"

          Add-Content $env:GITHUB_ENV "WindowsSDKVersion=10.0.18362.0"

      # -------------------------
      # MSVC FIXED
      # -------------------------
      - name: Setup MSVC environment
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -products * -property installationPath

          $msvc = "14.34.31933"
          $msvcPath = "$vsPath\VC\Tools\MSVC\$msvc"

          if (!(Test-Path $msvcPath)) {
            Write-Error "MSVC fehlt"
            exit 1
          }

          Add-Content $env:GITHUB_ENV "VCToolsVersion=$msvc"

          Write-Host "MSVC OK"

      # -------------------------
      # VERIFY WINMD FIX
      # -------------------------
      - name: Verify WinMD contract
        shell: pwsh
        run: |
          $winmd = "C:\Program Files (x86)\Windows Kits\10\References\10.0.18362.0\Windows.Foundation.FoundationContract\4.0.0.0\Windows.Foundation.FoundationContract.winmd"

          if (!(Test-Path $winmd)) {
            Write-Error "WINMD fehlt -> SDK Installation kaputt"
            exit 1
          }

          Write-Host "WinMD OK"

      # -------------------------
      # BUILD
      # -------------------------
      - name: Generate GN
        shell: pwsh
        run: |
          python cobalt/build/gn.py -c $env:BUILD_TYPE

      - name: Build
        shell: pwsh
        run: |
          ninja -C out/$env:BUILD_TYPE

      # -------------------------
      # ARTIFACT
      # -------------------------
      - name: Collect artifact
        if: success()
        shell: pwsh
        run: |
          $dir = "artifact"
          Remove-Item $dir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $dir

          Copy-Item "out/$env:BUILD_TYPE/*" $dir -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xb1_build
          path: artifact/**
          retention-days: 30

      - name: Release ZIP
        if: success() && inputs.upload_release == true
        shell: pwsh
        run: |
          Compress-Archive -Path "artifact/*" -DestinationPath "xb1.zip"

      - name: Upload Release
        if: success() && inputs.upload_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_number }}
          files: xb1.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
