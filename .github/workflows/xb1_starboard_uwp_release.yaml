name: Cobalt Dual-Platform Build (Xbox & Win)

on:
  push:
    tags:
      - 'v*' # Startet Build bei Tags wie v1.0.0
  workflow_dispatch: # Erlaubt manuelles Starten jederzeit

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: windows-2022
    strategy:
      fail-fast: false # Wenn ein Build fehlschlägt, läuft der andere weiter
      matrix:
        # Hier findet die Magie statt: Beide Plattformen laufen PARALLEL
        platform: [xb1, win-win32]
        config: [devel]

    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
      GYP_MSVS_VERSION: "2022"

    steps:
      - name: Checkout Cobalt Fork
        uses: actions/checkout@v4
        with:
          path: src

      - name: Cache Depot Tools
        id: cache-depot-tools
        uses: actions/cache@v4
        with:
          path: depot_tools
          key: ${{ runner.os }}-depot-tools

      - name: Setup Environment
        run: |
          if ("${{ steps.cache-depot-tools.outputs.cache-hit }}" -ne "true") {
            git clone https://googlesource.com
          }
          echo "$pwd/depot_tools" >> $env:GITHUB_PATH
          choco install ninja winflexbison3 -y
        shell: pwsh

      - name: GClient Sync (Parallel Cached)
        run: |
          cd src
          gclient config --spec 'solutions = [{ "name": "src", "url": "${{ github.server_url }}/${{ github.repository }}.git", "managed": False, "custom_deps": {}, "safesync_url": "" }]'
          gclient sync --force --nohooks --no-history --shallow
        shell: pwsh

      - name: Build Cobalt
        run: |
          cd src
          python cobalt/build/gn.py -p ${{ matrix.platform }} -c ${{ matrix.config }}
          ninja -C out/${{ matrix.platform }}_${{ matrix.config }} cobalt
        shell: pwsh

      - name: Package Apps
        run: |
          cd src
          mkdir out/final_package
          if ("${{ matrix.platform }}" -eq "xb1") {
            python starboard/xb1/tools/packager.py -s out/xb1_devel/ -o out/final_package -p cobalt
          } else {
            xcopy /E /I out/win-win32_devel out/final_package
          }
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cobalt-${{ matrix.platform }}
          path: src/out/final_package/

      - name: Create Release (Optional)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/out/final_package/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
