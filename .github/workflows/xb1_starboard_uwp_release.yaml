name: windows_release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ============================================================
  # win-win32  (x86 Desktop — starboard/win/)
  # ============================================================
  win-win32:
    runs-on: windows-2022
    env:
      GYP_MSVS_VERSION: "2022"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Environment
        shell: pwsh
        run: |
          choco install ninja winflexbison3 -y

      - name: Install GN
        shell: pwsh
        run: |
          wget https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest -O gn.zip
          unzip gn.zip -d gn_bin
          sudo mv gn_bin/gn /usr/local/bin/gn
          sudo chmod +x /usr/local/bin/gn

      - name: Set PYTHONPATH
        shell: pwsh
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE:$PYTHONPATH" >> $GITHUB_ENV

      - name: GN
        shell: pwsh
        run: |
          $timestamp = [int][(Get-Date).ToUniversalTime().Subtract((Get-Date 1970-01-01)).TotalSeconds]
          
          # Erweitere Args analog zu Android (mit target_os und target_cpu)
          gn gen out/win-win32_gold `
            --args="target_platform=`"win-win32`" target_os=`"win32`" target_cpu=`"x86`" build_type=`"gold`" sb_api_version=15 build_timestamp=$timestamp"
          
          gn check out/win-win32_gold

      - name: Build
        shell: pwsh
        run: |
          $env:NINJA_STATUS = "[%e sec | %f/%t %u remaining | %c/sec | j%r] "
          # ninja -C out/win-win32_gold cobalt -j 4
          ninja -C out/win-win32_gold cobalt_install

      - name: Create ZIP
        shell: pwsh
        run: |
          Get-ChildItem out/win-win32_gold `
            -Exclude obj,gen,*.ninja,*.ninja_deps,*.ninja_log,toolchain `
            | Compress-Archive `
              -DestinationPath out/TizenTubeCobalt-Win32.zip `
              -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeCobalt-Win32
          path: out/TizenTubeCobalt-Win32.zip

  # ============================================================
  # xb1  (Xbox One UWP AppX — starboard/xb1/)
  # ============================================================
  xb1:
    runs-on: windows-2022
    env:
      GYP_MSVS_VERSION: "2022"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Environment
        shell: pwsh
        run: |
          choco install ninja winflexbison3 -y

      - name: Install GN
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest" `
            -OutFile gn.zip
          Expand-Archive -Path gn.zip -DestinationPath gn_bin -Force
          $gnPath = "$env:GITHUB_WORKSPACE\gn_bin"
          echo "$gnPath" >> $env:GITHUB_PATH

      - name: Set PYTHONPATH
        shell: pwsh
        run: |
          "PYTHONPATH=$env:GITHUB_WORKSPACE" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

      - name: GN
        shell: pwsh
        run: |
          $timestamp = [int][(Get-Date).ToUniversalTime().Subtract((Get-Date 1970-01-01)).TotalSeconds]

          # Xbox nutzt x64 Architektur
          gn gen out/xb1_gold `
            --args="target_platform=`"xb1`" target_os=`"xboxone`" target_cpu=`"x64`" build_type=`"gold`" sb_api_version=15 build_timestamp=$timestamp"
          
          gn check out/xb1_gold

      - name: Build
        shell: pwsh
        run: |
          $env:NINJA_STATUS = "[%e sec | %f/%t %u remaining | %c/sec | j%r] "
          ninja -C out/xb1_gold cobalt_install -j 4

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out/xb1_package | Out-Null
          python starboard/xb1/tools/packager.py `
            -s out/xb1_gold `
            -o out/xb1_package `
            -p cobalt

      - name: Create ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out/xb1_zip_staging | Out-Null
          Copy-Item -Path out/xb1_package/* -Destination out/xb1_zip_staging -Force
          Get-ChildItem out/xb1_gold `
            -Exclude obj,gen,*.ninja,*.ninja_deps,*.ninja_log,toolchain,appx `
            | Copy-Item -Destination out/xb1_zip_staging -Force
          Compress-Archive `
            -Path out/xb1_zip_staging/* `
            -DestinationPath out/TizenTubeCobalt-Xbox-One.zip `
            -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeCobalt-Xbox-One
          path: out/TizenTubeCobalt-Xbox-One.zip

  # ============================================================
  # Release
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [win-win32, xb1]
    runs-on: ubuntu-latest
    steps:
      - name: Download Win32 artifact
        uses: actions/download-artifact@v4
        with:
          name: TizenTubeCobalt-Win32
          path: dist
      - name: Download Xbox artifact
        uses: actions/download-artifact@v4
        with:
          name: TizenTubeCobalt-Xbox-One
          path: dist
      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*.zip
          file_glob: true
          tag: ${{ github.ref_name }}
          overwrite: true

